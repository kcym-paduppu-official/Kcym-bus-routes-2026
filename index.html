        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --card-bg: #e3f2fd; /* Light Blue */
            --limited-bg: #ffebee; /* Reddish for Limited Stop */
            --header-bg: #1565c0;
        }

        .dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e3a5f;
            --limited-bg: #b71c1c;
            --header-bg: #0d47a1;
        }

        body {
            font-family: 'Times new roman',Times,serif;
          font-weight:bold;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }

        /* Bus Animation */
        .bus-animation {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .bus-emoji {
            display: inline-block;
            animation: moveBus 10s linear infinite;
        }
        @keyframes moveBus {
            from { transform: translateX(-100%); }
            to { transform: translateX(100vw); }
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .dark-mode-btn {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            background: var(--header-bg);
            color: white;
        }

        #searchInput {
            padding: 12px;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .filter-buttons button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background: #4caf50;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-buttons button:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        /* Bus List Layout */
        .bus-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .bus-card {
            padding: 15px;
            border-radius: 10px;
            background-color: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease-in-out;
            border-left: 5px solid #2196f3;
        }

        .bus-card.limited-stop {
            background-color: var(--limited-bg);
            border-left: 5px solid #f44336;
            color: #b71c1c;
        }
        
        .dark-mode .bus-card.limited-stop {
            color: #ffcdd2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bus-time { font-weight: bold; font-size: 1.2rem; }
        .bus-name { color: var(--header-bg); font-weight: bold; }
        .dark-mode .bus-name { color: #90caf9; }
    </style>

        function displayBuses(filterList) {
            const container = document.getElementById('busList');
            container.innerHTML = '';
            filterList.forEach(bus => {
                const card = document.createElement('div');
                card.className = `bus-card ${bus.limited ? 'limited-stop' : ''}`;
                card.innerHTML = `
                    <div class="bus-time">${bus.time}</div>
                    <div class="bus-name">${bus.name}</div>
                    <div class="bus-route">${bus.route}</div>
                `;
                container.appendChild(card);
            });
        }

        function filterBuses() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = buses.filter(bus => 
                bus.name.toLowerCase().includes(searchTerm) || 
                bus.route.toLowerCase().includes(searchTerm)
            );
            displayBuses(filtered);
        }

        function filterType(type) {
            let filtered;
            if (type === 'all') {
                filtered = buses;
            } else {
                filtered = buses.filter(bus => bus.dest === type);
            }
            displayBuses(filtered);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        // Initial Display
        displayBuses(buses);
    </script>
</body>
</html>
